<!DOCTYPE html>
<html lang = "en">
    <head>
      <meta charset = "UTF-8" />
      <meta name = "viewport" content = "width = device-width, initial-scale = 1.0" />
      <title>JavaScript Carousel</title>
      <link rel = "stylesheet" href = "style.css" />
      <style>
        .site-container {
          max-width: 800px;
          margin: 3em auto;
          padding: 2em;
        }

        .demo-title {
          text-align: center;
          margin-bottom: 2em;
        }

        .carousel {
          margin-top: 4em;
        }
      </style>
    </head>

    <body class = "site-container">
        <div id = "carousel-1" class = "carousel" role = "region" aria-labelledby = "carousel-1-title">
          <h2 class = "carousel-title"> Beautiful Landscapes </h2>
          <p class = "carousel-description"> An autoplaying carousel of landscapes with pagination enabled </p>
          <div class = "slide" role = "tabpanel" aria-labelledby = "carousel-1-slide-1-title">
            <div class = "slide-content">
              <div class = "slide-caption">
                <h3 id = "carousel-1-slide-1-title"> Nanda Kot peak </h3>
                <p> Mukteshwar, Uttarakhand </p>
              </div>
              <img src = "https://source.unsplash.com/gkIXFjDRyDc/1600x700" alt = "Nanda Kot peak" width = "800" height = "350" />
            </div>
          </div>
        </div>

        <div id = "carousel-2" class = "carousel" role = "region" aria-labelledby = "carousel-1-title">
          <h2 class = "carousel-title" id = "carousel-2-title"> Delicious food </h2>
          <p class = "carousel-description"> An carousel of some food items with pagination and autoplaying disabled </p>
          <div class = "slide" role = "tabpanel" aria-labelledby = "carousel-2-slide-1-title">
            <div class = "slide-content">
              <div class = "slide-caption">
                <h3 id = "carousel-2-slide-1-title"> Red Curry </h3>
                <p> Clicked by
                  <a href = "https://unsplash.com/photos/flat-lay-photography-of-vegetable-soup-on-white-ceramic-cup-XoByiBymX20"> Emy </a>
                </p>
              </div>
              <img src = "https://source.unsplash.com/XoByiBymX20/1600x700" alt = "Red Curry" width = "800" height = "350" />
            </div>
          </div>
          <div class = "slide" role = "tabpanel" aria-labelledby = "carousel-2-slide-2-title">
            <div class = "slide-content">
              <div class = "slide-caption">
                <h3 id = "carousel-2-slide-2-title"> Red Curry </h3>
                <p> Clicked by
                  <a href = "https://unsplash.com/photos/flat-lay-photography-of-vegetable-soup-on-white-ceramic-cup-XoByiBymX20"> Emy </a>
                </p>
              </div>
              <img src = "https://source.unsplash.com/XoByiBymX20/1600x700" alt = "Red Curry" width = "800" height = "350" />
            </div>
          </div>
        </div>

      <script src = "carousel.js"></script>
      <script>
        const carousel1  =  JSCarousel({
          carouselSelector: "#carousel-1",
          slideSelector: ".slide",
          enablePagination: true,
        });

        carousel1.create();

        const carousel2  =  JSCarousel({
          carouselSelector: "#carousel-2",
        slideSelector: ".slide",
        enablePagination: true,
        enableAutoplay: true,
      });
      carousel2.create();
      window.addEventListener("unload", () => {
        carousel1.destroy();
        carousel2.destroy();
      });
    </script>
  </body>
</html>
